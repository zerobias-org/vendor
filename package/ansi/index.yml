description: >-
  The American National Standards Institute (ANSI) is a private, nonprofit organization that administers and coordinates the U.S. voluntary consensus standards and conformity assessment system. ANSI is an ISO/IEC 17024 accreditation body for individual certification programs — including those offered by (ISC)², IAPP, and many others.
