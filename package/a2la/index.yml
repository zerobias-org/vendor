name: A2LA
description: >-
  The American Association for Laboratory Accreditation (A2LA) is a nonprofit, internationally recognized ISO/IEC 17011 accreditation body. A2LA is the designated accreditation body for FedRAMP Third-Party Assessment Organizations (3PAOs) per ISO/IEC 17020 and accredits a broad range of testing, calibration, inspection, and certification bodies.
