description: >-
  CREST (Council of Registered Ethical Security Testers) is an international not-for-profit accreditation and certification body serving the cyber assurance industry. Accredits organizations across seven service domains and issues individual credentials (CPSA, CRT, CCT, CRIA, CRIS); supports government schemes including CHECK, CBEST, ASSURE, TIBER-EU, and GBEST.
