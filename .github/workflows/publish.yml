name: Publish

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle-ci.properties'
  workflow_dispatch:
    inputs:
      vendor:
        description: 'Vendor to publish (e.g. accelq). Leave blank for all changed since last tag.'
        required: false
      dry-run:
        description: 'Dry run (no publish)'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NEON_PARENT_BRANCH: content-master
  NEON_DB_ROLE: neondb_owner
  NEON_DB_NAME: zerobias

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # 1. Detect changed vendors → JSON array of Gradle project paths
  # ─────────────────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      vendors: ${{ steps.changed.outputs.vendors }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed vendors
        id: changed
        run: |
          set -euo pipefail

          # Manual dispatch with explicit vendor wins.
          if [ -n "${{ inputs.vendor }}" ]; then
            VENDORS="[\":${{ inputs.vendor }}\"]"
            echo "Manual dispatch: ${{ inputs.vendor }}"
            echo "vendors=$VENDORS" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "main" ]; then
            BASE_REF=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            BASE_REF="origin/main"
          fi

          echo "Base ref: ${BASE_REF:-<none>}"

          # A vendor dir = nearest ancestor of a changed file that contains
          # build.gradle.kts. Same discovery rule as module/collectorbot:
          # zbb requires the marker file for per-package targeting.
          VENDORS="[]"
          if [ -z "$BASE_REF" ]; then
            echo "No base ref — treating all vendors as changed"
            CHANGED_FILES=$(find package -name build.gradle.kts -not -path '*/node_modules/*')
          else
            CHANGED_FILES=$(git diff --name-only "$BASE_REF" HEAD -- 'package/' || true)
          fi

          for file in $CHANGED_FILES; do
            dir="$file"
            while [ "$dir" != "package" ] && [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              if [ -f "$dir/build.gradle.kts" ] && [ "$dir" != "package" ]; then
                # package/addigy → :addigy   (or package/adobe/ccf → :adobe:ccf)
                rel="${dir#package/}"
                proj=":${rel//\//:}"
                VENDORS=$(echo "$VENDORS" | jq -c --arg p "$proj" 'if index($p) then . else . + [$p] end')
                break
              fi
              dir=$(dirname "$dir")
            done
          done

          COUNT=$(echo "$VENDORS" | jq 'length')
          echo "Detected $COUNT changed vendor(s): $VENDORS"
          echo "vendors=$VENDORS" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────
  # 2. Publish each changed vendor in parallel
  #   gate (validate + dataloader) → publishNpm → promoteAll
  # ─────────────────────────────────────────────────────────────
  publish:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        vendor: ${{ fromJson(needs.detect.outputs.vendors) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WRITE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Import Vault Secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: publishing-role
          path: gh-actions
          secrets: |
            operations-kv/data/ci/github readPackagesToken | READ_TOKEN;
            operations-kv/data/ci/github writePackagesToken | WRITE_TOKEN;
            operations-kv/data/ci/github zb-token | ZB_TOKEN;
            operations-kv/data/ci/github dispatchToken | DISPATCH_TOKEN;
            operations-kv/data/neon/content api-key | NEON_API_KEY;
            operations-kv/data/neon/content project-id | NEON_PROJECT_ID;
            operations-kv/data/slack devopsNotifications | SLACK_DEVOPS_NOTIFICATIONS;
            operations-kv/data/slack releasesWebhook | SLACK_RELEASES_WEBHOOK;

      - name: Create Neon branch (ephemeral Postgres for dataloader)
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent_branch: ${{ env.NEON_PARENT_BRANCH }}
          branch_name: publish-${{ github.event.repository.name }}-${{ github.run_id }}-${{ strategy.job-index }}
          role: ${{ env.NEON_DB_ROLE }}
          database: ${{ env.NEON_DB_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Export Neon PG environment
        run: |
          echo "::add-mask::${{ steps.create_neon_branch.outputs.password }}"
          {
            echo "PGHOST=${{ steps.create_neon_branch.outputs.db_host }}"
            echo "PGPORT=5432"
            echo "PGUSER=${{ env.NEON_DB_ROLE }}"
            echo "PGPASSWORD=${{ steps.create_neon_branch.outputs.password }}"
            echo "PGDATABASE=${{ env.NEON_DB_NAME }}"
            echo "PGSSLMODE=require"
          } >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure git user
        run: |
          git config --global user.email "ci@zerobias.com"
          git config --global user.name "@$GITHUB_ACTOR"

      - name: Install dataloader CLI
        run: |
          cp .npmrc $HOME/.npmrc
          npm install -g @zerobias-com/platform-dataloader@latest
        env:
          NPM_TOKEN: ${{ env.READ_TOKEN }}
          ZB_TOKEN: ${{ env.ZB_TOKEN }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Gate ${{ matrix.vendor }}
        env:
          NPM_TOKEN: ${{ env.READ_TOKEN }}
          ZB_TOKEN: ${{ env.ZB_TOKEN }}
        run: ./gradlew "${{ matrix.vendor }}:gate" --no-daemon

      - name: Publish ${{ matrix.vendor }}
        if: inputs.dry-run != true
        env:
          NPM_TOKEN: ${{ env.WRITE_TOKEN }}
          READ_TOKEN: ${{ env.READ_TOKEN }}
          ZB_TOKEN: ${{ env.ZB_TOKEN }}
        run: |
          ./gradlew \
            "${{ matrix.vendor }}:publishNpm" \
            "${{ matrix.vendor }}:promoteAll" \
            --no-daemon

      - name: Dry-run publish ${{ matrix.vendor }}
        if: inputs.dry-run == true
        env:
          NPM_TOKEN: ${{ env.WRITE_TOKEN }}
          READ_TOKEN: ${{ env.READ_TOKEN }}
          ZB_TOKEN: ${{ env.ZB_TOKEN }}
        run: |
          ./gradlew \
            "${{ matrix.vendor }}:publishNpm" \
            "${{ matrix.vendor }}:promoteAll" \
            -PdryRun=true \
            --no-daemon

      - name: Generate packages file for release announcement
        if: success() && inputs.dry-run != true
        id: pkgfile
        run: |
          DIR="package/$(echo '${{ matrix.vendor }}' | sed 's|^:||; s|:|/|g')"
          NAME=$(jq -r '.name'    "$DIR/package.json")
          VERSION=$(jq -r '.version' "$DIR/package.json")
          FILE="/tmp/published-${{ strategy.job-index }}.json"
          echo "[{\"name\":\"$NAME\",\"version\":\"$VERSION\",\"location\":\"$(pwd)/$DIR\"}]" > "$FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Release announcement
        if: success() && inputs.dry-run != true
        uses: zerobias-org/devops/nx-actions/release-announcement@main
        with:
          packages-file: ${{ steps.pkgfile.outputs.file }}
          branch: ${{ github.ref_name }}
          dist-tag: ${{ github.ref_name == 'main' && 'latest' || github.ref_name == 'qa' && 'rc' || github.ref_name == 'dev' && 'dev' || 'uat' }}
        env:
          SLACK_RELEASES_WEBHOOK: ${{ env.SLACK_RELEASES_WEBHOOK }}
          SLACK_DEVOPS_NOTIFICATIONS: ${{ env.SLACK_DEVOPS_NOTIFICATIONS }}
          READ_TOKEN: ${{ env.READ_TOKEN }}

      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: publish-${{ github.event.repository.name }}-${{ github.run_id }}-${{ strategy.job-index }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Slack failure notification
        if: failure() && inputs.dry-run != true
        uses: rtCamp/action-slack-notify@master
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_DEVOPS_NOTIFICATIONS }}
          SLACK_ICON_EMOJI: ':fire:'
          MSG_MINIMAL: 'true'
          SLACK_TITLE: ':fire: ${{ github.repository }} publish failed — ${{ matrix.vendor }}'
          SLACK_MESSAGE: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          SLACK_COLOR: danger

  # ─────────────────────────────────────────────────────────────
  # 3. Sync main → uat → qa → dev after successful main publish
  # ─────────────────────────────────────────────────────────────
  sync:
    needs: publish
    if: github.ref == 'refs/heads/main' && inputs.dry-run != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WRITE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync branches
        uses: zerobias-org/devops/nx-actions/sync-branches@main
        with:
          branch: ${{ github.ref_name }}
