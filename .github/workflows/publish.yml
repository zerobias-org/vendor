name: Publish Vendor

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      vendor:
        description: 'Vendor to publish (e.g. github). Leave blank for all changed.'
        required: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    uses: zerobias-org/devops/.github/workflows/zbb-publish-reusable.yml@main
    with:
      ghcr-namespace: zerobias-org
      dispatch-input-name: vendor
      dispatch-input-value: ${{ inputs.vendor }}
    secrets: inherit
